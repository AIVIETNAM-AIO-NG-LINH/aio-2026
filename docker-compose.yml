# Local development: Django dev server (auto-reload).
# DB dùng chung ở stack nginx-aio (trên aio-net) — không có db riêng nữa.
# Yêu cầu: đã `docker network create aio-net` và đã up nginx-aio (db, redis) TRƯỚC.
# Usage: docker compose up --build
services:
  web:
    build: .
    restart: unless-stopped
    # Override the image's Gunicorn CMD with Django's auto-reloading dev server.
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      DB_HOST: db          # alias MariaDB dùng chung (ở nginx-aio)
    volumes:
      # Mount source for live reload during development.
      - .:/app
    # Không publish ra host — truy cập qua nginx-aio (http://ai.localhost).
    networks:
      aio-net:             # shared network — nginx-aio gọi tới qua alias `ai-aio`
        aliases:
          - ai-aio

  # Celery worker — đọc task từ redis broker, chạy pipeline ingest nền.
  worker:
    build: .
    restart: unless-stopped
    # Chờ-DB + migrate là việc của `web`; worker bỏ qua entrypoint, chạy thẳng celery.
    entrypoint: []
    command: celery -A config worker --loglevel=info
    env_file: .env
    environment:
      DB_HOST: db          # alias MariaDB dùng chung (ở nginx-aio)
    volumes:
      # Mount source để code worker đồng bộ với web khi dev (restart để áp dụng).
      - .:/app
    networks:
      - aio-net            # cần aio-net để tới redis (broker) + db dùng chung

networks:
  # tạo trước 1 lần:  docker network create aio-net
  aio-net:
    external: true
    name: aio-net
