# Local development stack: MariaDB + Django dev server (auto-reload).
# Usage: docker compose up --build
services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    restart: unless-stopped
    # Override the image's Gunicorn CMD with Django's auto-reloading dev server.
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      # Mount source for live reload during development.
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      default: {}            # mạng nội bộ (db)
      aio-net:               # shared network — nginx-aio gọi tới qua alias `ai-aio`
        aliases:
          - ai-aio

volumes:
  mariadb_data:

networks:
  default: {}
  # tạo trước 1 lần:  docker network create aio-net
  aio-net:
    external: true
    name: aio-net
