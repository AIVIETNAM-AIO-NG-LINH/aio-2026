# Production-like stack: MariaDB + Gunicorn (uses the Dockerfile CMD).
# Usage: docker compose -f docker-compose.prod.yml up --build -d
services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    # No host port exposed in production — only the web service talks to the DB.
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    restart: unless-stopped
    # No command override -> uses the Dockerfile CMD (Gunicorn).
    env_file: .env
    environment:
      DB_HOST: db
      DJANGO_DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
