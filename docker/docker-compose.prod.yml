# =============================================================================
# ai-aio — STACK PROD (Gunicorn web + Celery worker).
# Data store (db, redis, opensearch, postgres, neo4j) ĐÃ CHUYỂN sang data-aio.
# Yêu cầu: up data-aio TRƯỚC (tạo aio-net + các data store).
# Usage (từ repo root): docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Khác bản dev (docker/docker-compose.yml):
#   - KHÔNG có service data store (lấy từ data-aio qua alias opensearch/postgres/neo4j).
#   - KHÔNG mount source — code baked vào image.
#   - web chạy Gunicorn (CMD mặc định Dockerfile), DJANGO_DEBUG=False.
# =============================================================================
name: ai-aio

services:
  # web — Django + DRF chạy bằng Gunicorn (gthread, giữ SSE chat). Alias `ai-aio`
  # để gateway nginx-aio proxy tới ai-aio:8000.
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: aio/ai-aio:latest
    container_name: ai-aio-web
    restart: unless-stopped
    env_file:
      - ../.env          # config không bảo mật
      - ./secrets.env    # 🔐 secret (gitignored)
    environment:
      DJANGO_DEBUG: "False"
      DB_HOST: db        # alias MariaDB dùng chung (data-aio)
    networks:
      aio-net:
        aliases:
          - ai-aio

  # worker — Celery (pipeline ingest RAG nền). Dùng chung image với web.
  # Bỏ qua entrypoint (chờ-DB + migrate là việc của web) → chạy thẳng celery.
  worker:
    image: aio/ai-aio:latest
    container_name: ai-aio-worker
    restart: unless-stopped
    depends_on:
      - web
    entrypoint: []
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file:
      - ../.env
      - ./secrets.env
    environment:
      DJANGO_DEBUG: "False"
      DB_HOST: db
    networks:
      - aio-net

networks:
  # do data-aio tạo; up data-aio TRƯỚC.
  aio-net:
    external: true
    name: aio-net
